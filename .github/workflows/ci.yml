name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Syntax check all Python files
        run: |
          python -c "
          import py_compile, glob, sys
          errors = []
          for f in glob.glob('**/*.py', recursive=True):
              if 'venv' in f or '__pycache__' in f or 'node_modules' in f:
                  continue
              try:
                  py_compile.compile(f, doraise=True)
              except py_compile.PyCompileError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              for e in errors: print(e)
              sys.exit(1)
          print(f'All Python files compile OK')
          "

      - name: Import smoke test
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from data.external_feeds import feed_manager
          from analysis.calibration_tracker import calibration_tracker
          from engine.quant_brain import QuantBrain, ReasoningEngine, RLLearner
          from engine.strategies import STRATEGIES
          from models.risk_model import RiskModel, kalshi_fee_rt
          print('All critical modules import OK')
          "

      - name: Look-ahead bias scan (strict)
        run: python -m scripts.scan_lookahead --strict --severity WARNING

      - name: Run unit tests
        run: pytest tests/ -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000
